<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <script src="script.js"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
        @font-face {
            font-family: 'Onest', sans sans-serif;
            src: url(../fonts/Onest/Onest-VariableFont_wght.ttf);
        }

        @font-face {
            font-family: 'Red Hat Text', sans sans-serif;
            src: url(../fonts/Red_Hat_Text/RedHatText-VariableFont_wght.ttf);
        }
    </style>
</head>
<body>
  
<!-- nav -->
<nav>
  <div class="nav-content">
    <img src="../images/mme logo.png" alt="Small yellow MicroMarket logo.">
    
    <!-- Added: Hamburger Toggle Button for Mobile -->
    <button class="menu-toggle" aria-label="Toggle navigation menu">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="12" x2="20" y2="12" class="line-mid"></line>
        <line x1="4" y1="6" x2="20" y2="6" class="line-top"></line>
        <line x1="4" y1="18" x2="20" y2="18" class="line-bottom"></line>
      </svg>
    </button>

    <div class="nav-right">
      <div class="nav-links">
        <ul>
          <li>Buy</li>
          <li>Sell</li>
          <li>About Us</li>
          <li>Login/My Account</li>
        </ul>
      </div>
      <button class="contact-button">Contact Us</button>
    </div>
  </div>
</nav>

<!-- Footer -->
<footer>

    <section class="footer">
        <div class="footer-top">
            <img src="../images/small high-contrast mme logo.png" alt="white micromarket exchange logo.">
            <p>©2026 MicroMarket Exchange Inc.</p>
            <div class="icons">
              <img src="../images/email icon.png" alt="link to email.">
              <img src="../images/2023_Facebook_icon.svg.png" alt="facebook link.">
            </div>
        </div>
        <hr>
        <div class="footer-bottom">
            <ul>
              <li>Login/Sign Up</li>
              <li>List Your Products</li>
              <li>Account Portal</li>
              <li>Contact Us</li>
            </ul>
        </div>
    </section>

</footer>
